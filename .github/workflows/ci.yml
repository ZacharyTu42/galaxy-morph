name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}    # -e: exit on error, -l: login shell so conda activates
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: galaxy-morph
          cache-environment: true
          cache-downloads: true

      - name: Install package
        run: pip install -e . --no-deps

      - name: Run ruff lint
        run: ruff check src tests

      - name: Run ruff format check
        run: ruff format --check src tests

      - name: Run mypy
        run: mypy src

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: galaxy-morph
          cache-environment: true
          cache-downloads: true

      - name: Install package
        run: pip install -e . --no-deps

      - name: Run tests
        run: pytest -m "not slow and not gpu and not integration" -n auto

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
